# Backend stack — run from this directory: docker compose up --build
# Copy .env.docker.example to .env and set secrets.

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: react_hono_starter
      TZ: UTC
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PUBLISH_PORT:-3306}:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD" || exit 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  server:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_HOST: mysql
      DATABASE_USER: root
      DATABASE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      DATABASE_NAME: react_hono_starter
      DATABASE_PORT: 3306
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-changeme}@mysql:3306/react_hono_starter
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ENV: ${ENV:-production}
      # Exact browser origin of the SPA wherever it is hosted (can be another machine / domain).
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3000}
    ports:
      - "${SERVER_PUBLISH_PORT:-4000}:4000"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:

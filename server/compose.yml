# Backend — docker compose up --build  (uses .env.docker via env_file on services)
# bun run dev uses .env only — not .env.docker

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      MYSQL_DATABASE: react_hono_starter
      TZ: UTC
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PUBLISH_PORT:-3306}:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD" || exit 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "4010:4000"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:4000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql_data:

# Frontend-only stack — run from this directory: docker compose up --build
# The API runs elsewhere; set VITE_BACKEND_URL to the full base URL users’ browsers reach (no /api suffix).
#
# Copy .env.docker.example to .env and set VITE_BACKEND_URL at minimum.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:4000}
    ports:
      - "${WEB_PUBLISH_PORT:-3000}:80"
